<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cuaderno — испанские слова</title>
<style>
  :root{
    --paper: #f4efe4;
    --paper-line: #cfc3a8;
    --paper-margin: #c65b4a;
    --ink: #1f2a44;
    --ink-soft: #3d4a68;
    --graphite: #6b6558;
    --accent: #c65b4a;
    --accent-soft: #e3a598;
    --good: #4c7a5e;
    --shadow: rgba(31,42,68,0.14);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 34px;
    background-position: 0 92px;
    color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    overscroll-behavior: none;
  }
  body{ display:flex; flex-direction:column; min-height:100vh; }

  header{
    padding: 18px 20px 10px 56px;
    position: relative;
    border-bottom: 1px solid var(--paper-line);
    background: linear-gradient(180deg, rgba(244,239,228,1) 80%, rgba(244,239,228,0));
  }
  header::before{
    content:"";
    position:absolute; left:34px; top:0; bottom:0; width:2px;
    background: var(--paper-margin);
    opacity:0.55;
  }
  h1{
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-size: 22px; margin:0; font-weight:600; letter-spacing:0.2px;
    color: var(--ink);
  }
  .sub{
    font-size:12.5px; color:var(--graphite); margin-top:4px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing:0.3px;
  }

  nav{
    display:flex; gap:0; padding: 0 12px; margin-top: 10px;
    border-bottom: 1px solid var(--paper-line);
  }
  nav button{
    flex:1; background:none; border:none; padding:10px 4px 12px;
    font-size:13.5px; color: var(--graphite); font-weight:600;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    border-bottom: 3px solid transparent;
    cursor:pointer; letter-spacing:0.4px;
  }
  nav button.active{ color: var(--ink); border-bottom-color: var(--accent); }

  main{ flex:1; padding: 22px 20px 40px 56px; position:relative; max-width: 720px; margin:0 auto; width:100%; }
  main::before{
    content:"";
    position:absolute; left:34px; top:0; bottom:0; width:2px;
    background: var(--paper-margin);
    opacity:0.55;
  }

  .page{ display:none; }
  .page.active{ display:block; }

  /* ---- Practice page ---- */
  .status-line{
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12.5px; color: var(--graphite); margin-bottom: 14px;
  }
  .prompt-card{
    text-align:center; padding: 18px 10px 6px;
  }
  .prompt-label{
    font-size:12px; color: var(--graphite); text-transform:uppercase; letter-spacing:1.2px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .prompt-word{
    font-family: Georgia, "Iowan Old Style", serif;
    font-size: 34px; font-weight:600; color:var(--ink); margin: 6px 0 2px;
  }
  .prompt-example{
    font-size: 13px; color: var(--graphite); font-style: italic; min-height:18px;
  }

  .canvas-wrap{
    margin-top: 14px; border-radius: 6px; overflow:hidden;
    box-shadow: 0 2px 10px var(--shadow);
    background: repeating-linear-gradient(var(--paper), var(--paper) 33px, var(--paper-line) 34px);
    background-color: var(--paper);
    position: relative;
    touch-action: none;
  }
  canvas{ display:block; width:100%; touch-action:none; }

  .reveal-box{
    margin-top: 10px; text-align:center; min-height: 30px;
    font-family: Georgia, serif; font-size: 22px; color: var(--accent);
    font-style: italic; transition: opacity 0.2s;
  }

  .row-buttons{
    display:flex; gap:10px; margin-top: 14px; flex-wrap:wrap;
  }
  button.pill{
    border:none; border-radius: 22px; padding: 12px 18px; font-size: 14.5px;
    font-weight:600; cursor:pointer; flex:1; min-width: 110px;
    font-family: -apple-system, sans-serif;
  }
  .btn-clear{ background: #e6ddc9; color: var(--ink-soft); }
  .btn-show{ background: var(--ink); color: var(--paper); }
  .btn-good{ background: var(--good); color: white; }
  .btn-bad{ background: var(--accent); color: white; }
  .btn-neutral{ background:#e6ddc9; color:var(--ink-soft); }
  button.pill:active{ transform: scale(0.97); }
  button.pill:disabled{ opacity:0.35; }

  .empty-state{
    text-align:center; padding: 50px 10px; color: var(--graphite);
  }
  .empty-state .big{ font-family: Georgia, serif; font-size:20px; color:var(--ink); margin-bottom:8px;}

  /* ---- Add page ---- */
  .field{ margin-bottom: 16px; }
  .field label{
    display:block; font-size:12px; color: var(--graphite); margin-bottom: 5px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing:0.5px; text-transform:uppercase;
  }
  .field input, .field textarea{
    width:100%; border:none; border-bottom: 1.5px solid var(--paper-line);
    background: transparent; font-size: 18px; padding: 6px 2px 8px;
    font-family: Georgia, serif; color: var(--ink);
    outline:none;
  }
  .field input:focus, .field textarea:focus{ border-bottom-color: var(--accent); }
  .field textarea{ font-family: -apple-system, sans-serif; font-size:14px; resize:none; }

  .save-msg{ font-size:13px; color: var(--good); min-height:18px; margin-top:4px; }

  /* ---- List page ---- */
  .word-item{
    display:flex; justify-content:space-between; align-items:center;
    padding: 12px 0; border-bottom: 1px solid var(--paper-line);
    gap: 10px;
  }
  .word-item .es{ font-family: Georgia, serif; font-size:17px; color:var(--ink); }
  .word-item .ru{ font-size:13px; color: var(--graphite); }
  .word-item .meta{ font-size:11px; color: var(--graphite); font-family: ui-monospace, monospace; margin-top:2px;}
  .word-item .del{
    background:none; border:none; color: var(--accent); font-size:20px; cursor:pointer; padding:4px 8px;
  }
  .list-header{ font-size:12.5px; color:var(--graphite); font-family: ui-monospace, monospace; margin-bottom:8px;}

  .toast{
    position: fixed; bottom: 20px; left:50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 10px 18px;
    border-radius: 20px; font-size: 13px; opacity:0; pointer-events:none;
    transition: opacity 0.25s, transform 0.25s;
    font-family: -apple-system, sans-serif;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }
</style>
</head>
<body>

<header>
  <h1>Cuaderno</h1>
  <div class="sub" id="headerSub">исп. слова · перо по бумаге</div>
</header>

<nav>
  <button class="tab-btn active" data-page="practice">ПРАКТИКА</button>
  <button class="tab-btn" data-page="add">ДОБАВИТЬ</button>
  <button class="tab-btn" data-page="list">СЛОВА</button>
</nav>

<main>

  <!-- PRACTICE -->
  <section class="page active" id="page-practice">
    <div class="status-line" id="statusLine">загрузка…</div>
    <div id="practiceArea"></div>
  </section>

  <!-- ADD -->
  <section class="page" id="page-add">
    <div class="field">
      <label>Испанское слово</label>
      <input id="inEs" type="text" placeholder="p. ej. cuchara" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Перевод (рус.)</label>
      <input id="inRu" type="text" placeholder="ложка">
    </div>
    <div class="field">
      <label>Пример / контекст (необязательно)</label>
      <textarea id="inExample" rows="2" placeholder="La cuchara está en la mesa."></textarea>
    </div>
    <button class="pill btn-show" style="width:100%" id="btnAdd">Добавить слово</button>
    <div class="save-msg" id="saveMsg"></div>
  </section>

  <!-- LIST -->
  <section class="page" id="page-list">
    <div class="list-header" id="listHeader">слов: 0</div>
    <div id="listArea"></div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
(() => {
  const STORAGE_KEY = 'vocab-words-v1';
  const INTERVALS_DAYS = [0, 1, 2, 4, 7, 14, 30]; // box 0..6

  let words = [];
  let queue = [];
  let currentWord = null;
  let showingAll = false;

  // ---------- storage (plain browser localStorage — works when hosted anywhere) ----------
  async function loadWords(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      words = raw ? JSON.parse(raw) : [];
    }catch(e){
      words = [];
    }
  }
  async function saveWords(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
    }catch(e){
      console.error('storage save failed', e);
      showToast('Не удалось сохранить :(');
    }
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function todayTs(){ return Date.now(); }

  // ---------- toast ----------
  let toastTimer;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ---------- tabs ----------
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('page-' + btn.dataset.page).classList.add('active');
      if(btn.dataset.page === 'list') renderList();
      if(btn.dataset.page === 'practice') buildQueueAndRender();
    });
  });

  // ---------- add word ----------
  document.getElementById('btnAdd').addEventListener('click', async () => {
    const es = document.getElementById('inEs').value.trim();
    const ru = document.getElementById('inRu').value.trim();
    const example = document.getElementById('inExample').value.trim();
    if(!es || !ru){
      document.getElementById('saveMsg').textContent = 'Заполни оба поля.';
      return;
    }
    words.push({ id: uid(), es, ru, example, box: 0, nextReview: todayTs(), createdAt: todayTs() });
    await saveWords();
    document.getElementById('inEs').value = '';
    document.getElementById('inRu').value = '';
    document.getElementById('inExample').value = '';
    document.getElementById('saveMsg').textContent = `Добавлено: ${es} — ${ru}`;
    document.getElementById('inEs').focus();
    setTimeout(() => { document.getElementById('saveMsg').textContent = ''; }, 2500);
  });

  // ---------- list ----------
  function renderList(){
    const listArea = document.getElementById('listArea');
    document.getElementById('listHeader').textContent = `слов: ${words.length}`;
    if(words.length === 0){
      listArea.innerHTML = '<div class="empty-state"><div class="big">Пусто</div>Добавь первое слово на вкладке «Добавить».</div>';
      return;
    }
    const sorted = [...words].sort((a,b) => a.nextReview - b.nextReview);
    listArea.innerHTML = sorted.map(w => {
      const due = w.nextReview <= todayTs();
      const dateStr = new Date(w.nextReview).toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
      return `<div class="word-item" data-id="${w.id}">
        <div>
          <div class="es">${escapeHtml(w.es)}</div>
          <div class="ru">${escapeHtml(w.ru)}</div>
          <div class="meta">box ${w.box} · ${due ? 'сегодня' : dateStr}</div>
        </div>
        <button class="del" data-id="${w.id}">✕</button>
      </div>`;
    }).join('');
    listArea.querySelectorAll('.del').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        words = words.filter(w => w.id !== id);
        await saveWords();
        renderList();
      });
    });
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- practice queue ----------
  function buildQueueAndRender(){
    const now = todayTs();
    let due = words.filter(w => w.nextReview <= now);
    if(due.length === 0 && words.length > 0){
      showingAll = false;
      renderEmptyDue();
      return;
    }
    if(words.length === 0){
      renderNoWordsAtAll();
      return;
    }
    due.sort((a,b) => a.box - b.box || a.nextReview - b.nextReview);
    queue = due;
    document.getElementById('statusLine').textContent = `к повторению сегодня: ${queue.length}`;
    nextCard();
  }

  function renderNoWordsAtAll(){
    document.getElementById('statusLine').textContent = '';
    document.getElementById('practiceArea').innerHTML =
      '<div class="empty-state"><div class="big">Слов пока нет</div>Добавь их на вкладке «Добавить» — и возвращайся сюда писать.</div>';
  }

  function renderEmptyDue(){
    document.getElementById('statusLine').textContent = 'на сегодня всё повторено ✓';
    document.getElementById('practiceArea').innerHTML = `
      <div class="empty-state">
        <div class="big">Готово на сегодня</div>
        Можно потренировать все слова ещё раз, вне графика.
      </div>
      <button class="pill btn-neutral" style="width:100%" id="btnPracticeAll">Тренировать всё равно</button>
    `;
    document.getElementById('btnPracticeAll').addEventListener('click', () => {
      queue = [...words].sort((a,b) => a.box - b.box);
      showingAll = true;
      document.getElementById('statusLine').textContent = `внеплановая тренировка: ${queue.length}`;
      nextCard();
    });
  }

  function nextCard(){
    if(queue.length === 0){
      if(showingAll){ renderEmptyDue(); } else { buildQueueAndRender(); }
      return;
    }
    currentWord = queue.shift();
    renderPracticeCard();
  }

  function renderPracticeCard(){
    const area = document.getElementById('practiceArea');
    area.innerHTML = `
      <div class="prompt-card">
        <div class="prompt-label">напиши по-испански</div>
        <div class="prompt-word">${escapeHtml(currentWord.ru)}</div>
        <div class="prompt-example">${currentWord.example ? escapeHtml(currentWord.example.replace(currentWord.es, '···')) : ''}</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="writeCanvas"></canvas>
      </div>
      <div class="reveal-box" id="revealBox"></div>
      <div class="row-buttons" id="rowPre">
        <button class="pill btn-clear" id="btnClear">Стереть</button>
        <button class="pill btn-show" id="btnShow">Показать ответ</button>
      </div>
      <div class="row-buttons" id="rowPost" style="display:none">
        <button class="pill btn-bad" id="btnBad">Не вспомнил</button>
        <button class="pill btn-good" id="btnGood">Вспомнил</button>
      </div>
    `;
    setupCanvas();
    document.getElementById('btnClear').addEventListener('click', clearCanvas);
    document.getElementById('btnShow').addEventListener('click', () => {
      document.getElementById('revealBox').textContent = currentWord.es;
      document.getElementById('rowPre').style.display = 'none';
      document.getElementById('rowPost').style.display = 'flex';
    });
    document.getElementById('btnGood').addEventListener('click', () => gradeCard(true));
    document.getElementById('btnBad').addEventListener('click', () => gradeCard(false));
  }

  async function gradeCard(correct){
    const w = words.find(x => x.id === currentWord.id);
    if(w){
      if(correct){
        w.box = Math.min(w.box + 1, INTERVALS_DAYS.length - 1);
      }else{
        w.box = 0;
      }
      const days = INTERVALS_DAYS[w.box];
      w.nextReview = todayTs() + days * 24 * 60 * 60 * 1000;
      await saveWords();
    }
    document.getElementById('statusLine').textContent = `осталось: ${queue.length}`;
    nextCard();
  }

  // ---------- canvas / pencil ----------
  let ctx, canvas, drawing = false, lastX, lastY;

  function setupCanvas(){
    canvas = document.getElementById('writeCanvas');
    const wrap = canvas.parentElement;
    const cssWidth = wrap.clientWidth;
    const cssHeight = 150;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = cssWidth * dpr;
    canvas.height = cssHeight * dpr;
    canvas.style.height = cssHeight + 'px';
    ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1f2a68';

    canvas.addEventListener('pointerdown', onPointerDown, {passive:false});
    canvas.addEventListener('pointermove', onPointerMove, {passive:false});
    window.addEventListener('pointerup', onPointerUp, {passive:false});
    window.addEventListener('pointercancel', onPointerUp, {passive:false});
  }

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function onPointerDown(e){
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    canvas.setPointerCapture(e.pointerId);
  }

  function onPointerMove(e){
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    const pressure = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : 0.5;
    ctx.lineWidth = 1.4 + pressure * 3.2;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }

  function onPointerUp(e){
    drawing = false;
  }

  function clearCanvas(){
    if(!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ---------- init ----------
  async function init(){
    await loadWords();
    const due = words.filter(w => w.nextReview <= todayTs()).length;
    document.getElementById('headerSub').textContent =
      words.length ? `${words.length} слов в тетради · ${due} на сегодня` : 'исп. слова · перо по бумаге';
    buildQueueAndRender();
  }
  init();
})();
</script>

</body>
</html>
